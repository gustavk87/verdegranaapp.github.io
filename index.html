<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VerdeGrana - Smart Budget AI</title>
    
    <!-- Meta Tags for PWA/Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">

    <!-- Styles: Tailwind CSS 3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        emerald: { 500: '#10b981', 600: '#059669' },
                        slate: { 950: '#020617' }
                    },
                    animation: { 'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite' }
                }
            }
        }
    </script>
    
    <!-- Dependencies (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-chartjs-2@5.2.0/dist/react-chartjs-2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/framer-motion@11.1.7/dist/framer-motion.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/sonner@1.3.1/dist/index.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb@8/build/umd.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --font-sans: 'Inter', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            font-family: var(--font-sans);
            background-color: #020617;
            color: white;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .float { animation: float 6s ease-in-out infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // --- Robust Global Extraction (Anti-Error #130) ---
        const getGlobal = (key) => window[key] || {};
        
        // Helper to ensure we never return 'undefined' to React as a component
        const safe = (comp, name) => {
            if (comp) return comp;
            return (props) => <div data-fallback={name} {...props}>{props.children}</div>;
        };

        const MotionLib = getGlobal('Motion') || getGlobal('framerMotion') || {};
        const motion = MotionLib.motion || { 
            div: 'div', button: 'button', nav: 'nav', section: 'section', header: 'header', 
            main: 'main', span: 'span', h1: 'h1', h2: 'h2', h3: 'h3', p: 'p', 
            form: 'form', input: 'input', select: 'select', svg: 'svg' 
        };
        const AnimatePresence = safe(MotionLib.AnimatePresence, 'AnimatePresence');

        const Lucide = getGlobal('LucideReact') || getGlobal('lucide') || {};
        const iconSafe = (name) => safe(Lucide[name], name);

        const LayoutDashboard = iconSafe('LayoutDashboard');
        const ReceiptText = iconSafe('ReceiptText');
        const Bot = iconSafe('Bot');
        const Settings = iconSafe('Settings');
        const Plus = iconSafe('Plus');
        const Trash2 = iconSafe('Trash2');
        const X = iconSafe('X');
        const TrendingUp = iconSafe('TrendingUp');
        const TrendingDown = iconSafe('TrendingDown');
        const Wallet = iconSafe('Wallet');
        const Leaf = iconSafe('Leaf');
        const LogOut = iconSafe('LogOut');
        const RefreshCw = iconSafe('RefreshCw');
        const Home = iconSafe('Home');
        const User = iconSafe('User');
        const ShieldCheck = iconSafe('ShieldCheck');
        const Cloud = iconSafe('Cloud');
        const Play = iconSafe('Play');
        const Users = iconSafe('Users');
        const FolderSync = iconSafe('FolderSync');
        const AlertTriangle = iconSafe('AlertTriangle');
        const ChevronRight = iconSafe('ChevronRight');
        const Info = iconSafe('Info');

        const Sonner = getGlobal('sonner') || getGlobal('Sonner') || {};
        const Toaster = safe(Sonner.Toaster, 'Toaster');
        const toast = Sonner.toast || { success: console.log, error: console.log, info: console.log, warning: console.log };

        const Charts = getGlobal('ReactChartjs2') || {};
        const ChartBar = safe(Charts.Bar, 'Bar');
        const ChartLine = safe(Charts.Line, 'Line');
        const ChartDoughnut = safe(Charts.Doughnut, 'Doughnut');

        // --- Supabase Init (Module 1) ---
        const SUPABASE_URL = 'https://cigrmsoprnefiwbenbuv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNpZ3Jtc29wcm5lZml3YmVuYnV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MTM0ODIsImV4cCI6MjA5NDM4OTQ4Mn0.C_njZ0VD_qwKnGGgEcaBUy9Qm0xXbtia1inucnmqckg';
        
        let supabase = null;
        let cloudAvailable = false;
        try {
            if (window.supabase) {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                cloudAvailable = !!supabase;
            }
        } catch (e) {
            console.warn("Supabase initialization bypassed:", e);
        }

        // --- Database (IDB) ---
        const DB_NAME = 'VerdeGrana_Vercel_DB';
        const STORE_NAME = 'state_store';
        const initDB = async () => idb.openDB(DB_NAME, 1, { upgrade(db) { db.createObjectStore(STORE_NAME); } });
        const saveToDB = async (db, val) => db.put(STORE_NAME, val, 'app_state');
        const getFromDB = async (db) => db.get(STORE_NAME, 'app_state');

        const DEFAULT_CATEGORIES = ['Alimentação', 'Moradia', 'Transporte', 'Lazer', 'Saúde', 'Educação', 'Outros'];

        // --- Main Component ---
        function App() {
            // Boot State
            const [bootStatus, setBootStatus] = useState('syncing'); // syncing, auth, profile_select, ready
            const [user, setUser] = useState(null);
            const [activeProfile, setActiveProfile] = useState(() => localStorage.getItem('vg_last_profile') || 'Principal');
            const [profiles, setProfiles] = useState(['Principal']);
            
            // Financial Data
            const [transactions, setTransactions] = useState([]);
            const [categories, setCategories] = useState(DEFAULT_CATEGORIES.map(c => ({ id: c.toLowerCase(), name: c })));
            
            // App Layout / Logic
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isCloudMode, setIsCloudMode] = useState(false);
            const [folderHandle, setFolderHandle] = useState(null);
            const [showFolderModal, setShowFolderModal] = useState(false);
            const [showAddModal, setShowAddModal] = useState(false);
            const [syncStatus, setSyncStatus] = useState('idle'); // idle, working, synced, error

            // Form State
            const [newTx, setNewTx] = useState({ desc: '', value: '', type: 'saída', category: 'Alimentação' });

            const cn = (...classes) => classes.filter(Boolean).join(' ');
            const formatCurrency = (val) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0);

            // --- Handlers: Folder Sync (Module 2) ---
            const requestFolderAccess = async () => {
                try {
                    if (!window.showDirectoryPicker) {
                        toast.error("Navegador incompatível com Sincronização de Pasta. Use Chrome, Edge ou Brave.");
                        return;
                    }
                    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
                    setFolderHandle(handle);
                    setShowFolderModal(false);
                    
                    // Scan files for profiles
                    const list = [];
                    for await (const entry of handle.values()) {
                        if (entry.kind === 'file' && entry.name.endsWith('.json')) {
                            list.push(entry.name.replace('.json', ''));
                        }
                    }
                    if (list.length > 0) setProfiles(list);
                    
                    const db = await initDB();
                    await saveToDB(db, { folderHandle: handle });
                    
                    setBootStatus('profile_select');
                    toast.success("Pasta vinculada com sucesso!");
                } catch (e) {
                    console.error(e);
                    toast.error("Acesso à pasta negado ou cancelado.");
                }
            };

            const loadProfile = async (pName) => {
                setSyncStatus('working');
                setActiveProfile(pName);
                localStorage.setItem('vg_last_profile', pName);

                try {
                    if (isCloudMode && user && cloudAvailable) {
                        const { data, error } = await supabase.from('transactions').select('*').eq('user_id', user.id).eq('profile_name', pName);
                        if (!error) setTransactions(data.map(t => ({ id: t.id, date: t.date, desc: t.description, value: t.amount, category: t.category, type: t.type })));
                    } else if (folderHandle) {
                        try {
                            const fileHandle = await folderHandle.getFileHandle(`${pName}.json`);
                            const file = await fileHandle.getFile();
                            const content = await file.text();
                            const data = JSON.parse(content);
                            setTransactions(data.transactions || []);
                            if(data.categories) setCategories(data.categories);
                        } catch (e) {
                            setTransactions([]); // New profile or empty
                        }
                    }
                    setSyncStatus('synced');
                    setBootStatus('ready');
                } catch (e) {
                    setSyncStatus('error');
                    setBootStatus('ready');
                }
            };

            const saveProfileData = useCallback(async (txs, cats) => {
                if (!folderHandle) return;
                setSyncStatus('working');
                try {
                    const fileHandle = await folderHandle.getFileHandle(`${activeProfile}.json`, { create: true });
                    const writable = await fileHandle.createWritable();
                    await writable.write(JSON.stringify({ transactions: txs, categories: cats }, null, 2));
                    await writable.close();
                    setSyncStatus('synced');
                } catch (e) {
                    setSyncStatus('error');
                }
            }, [folderHandle, activeProfile]);

            // Auto-Save Effect
            useEffect(() => {
                if (bootStatus === 'ready' && folderHandle) {
                    const timer = setTimeout(() => saveProfileData(transactions, categories), 1000);
                    return () => clearTimeout(timer);
                }
            }, [transactions, categories, activeProfile, folderHandle, bootStatus, saveProfileData]);

            // --- Initial Boot Logic (Module 3 & 4) ---
            useEffect(() => {
                const boot = async () => {
                    try {
                        const db = await initDB();
                        const persisted = await getFromDB(db);

                        // 1. Check Cloud
                        if (cloudAvailable) {
                            const { data: { session } } = await supabase.auth.getSession();
                            if (session?.user) {
                                setUser(session.user);
                                setIsCloudMode(true);
                                // Fetch profiles from cloud
                                const { data } = await supabase.from('profiles').select('name').eq('user_id', session.user.id);
                                if (data?.length) setProfiles(data.map(i => i.name));
                                setBootStatus('profile_select');
                                return;
                            }
                        }

                        // 2. Check Persisted Folder
                        if (persisted?.folderHandle) {
                            const permission = await persisted.folderHandle.queryPermission({ mode: 'readwrite' });
                            if (permission === 'granted') {
                                setFolderHandle(persisted.folderHandle);
                                // Rescan profiles
                                const list = [];
                                for await (const entry of persisted.folderHandle.values()) {
                                    if (entry.kind === 'file' && entry.name.endsWith('.json')) list.push(entry.name.replace('.json', ''));
                                }
                                if (list.length) setProfiles(list);
                                setBootStatus('profile_select');
                                return;
                            }
                        }

                        // 3. Fallback to start
                        setBootStatus('auth');
                    } catch (e) {
                        setBootStatus('auth');
                    }
                };
                boot();
            }, []);

            // Stats Helper
            const stats = useMemo(() => {
                const inc = transactions.filter(t => t.type === 'entrada').reduce((a, b) => a + b.value, 0);
                const exp = transactions.filter(t => t.type === 'saída').reduce((a, b) => a + b.value, 0);
                return { total: inc - exp, income: inc, expense: exp };
            }, [transactions]);

            const handleAddTransaction = () => {
                if (!newTx.desc || !newTx.value) return toast.error("Preencha todos os campos.");
                const tx = {
                    id: Date.now().toString(),
                    desc: newTx.desc,
                    value: parseFloat(newTx.value),
                    type: newTx.type,
                    category: newTx.category,
                    date: new Date().toISOString()
                };
                setTransactions([...transactions, tx]);
                setNewTx({ desc: '', value: '', type: 'saída', category: 'Alimentação' });
                setShowAddModal(false);
                toast.success("Transação adicionada!");
            };

            const deleteTransaction = (id) => {
                setTransactions(transactions.filter(t => t.id !== id));
                toast.success("Removido com sucesso.");
            };

            // --- Render Logic ---
            if (bootStatus === 'syncing') {
                return (
                    <div className="h-screen bg-slate-950 flex flex-col items-center justify-center p-8">
                        <RefreshCw className="w-12 h-12 text-emerald-500 animate-spin mb-4" />
                        <p className="text-slate-500 font-bold uppercase tracking-widest text-xs">Inicializando VerdeGrana...</p>
                    </div>
                );
            }

            if (bootStatus === 'auth') {
                return (
                    <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-8">
                        <motion.div initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} className="w-full max-w-sm space-y-12">
                            <div className="text-center">
                                <div className="w-20 h-20 bg-emerald-500 rounded-[2rem] flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-emerald-500/20">
                                    <Leaf className="w-10 h-10 text-white" />
                                </div>
                                <h1 className="text-4xl font-black tracking-tighter mb-2">VerdeGrana</h1>
                                <p className="text-slate-500">Seu dinheiro, suas regras.</p>
                            </div>

                            <div className="grid gap-4">
                                <button className="w-full p-6 bg-white/5 border border-white/10 rounded-3xl flex items-center gap-4 hover:bg-white/10 transition-all text-left">
                                    <Cloud className="w-8 h-8 text-blue-400" />
                                    <div>
                                        <div className="font-bold">VerdeGrana Cloud</div>
                                        <p className="text-xs text-slate-500">Acesse de qualquer lugar.</p>
                                    </div>
                                </button>
                                <button 
                                    onClick={() => setShowFolderModal(true)}
                                    className="w-full p-6 bg-white/5 border border-white/10 rounded-3xl flex items-center gap-4 hover:bg-white/10 transition-all text-left"
                                >
                                    <FolderSync className="w-8 h-8 text-emerald-400" />
                                    <div>
                                        <div className="font-bold">Sincronização Local</div>
                                        <p className="text-xs text-slate-500">Seus dados no seu dispositivo.</p>
                                    </div>
                                </button>
                                <button 
                                    onClick={() => setBootStatus('profile_select')}
                                    className="w-full p-6 bg-white/5 border border-white/10 rounded-3xl flex items-center gap-4 hover:bg-white/10 transition-all text-left opacity-50"
                                >
                                    <Play className="w-8 h-8 text-slate-400" />
                                    <div>
                                        <div className="font-bold">Modo Offline / Trial</div>
                                        <p className="text-xs text-slate-500">Apenas memória do navegador.</p>
                                    </div>
                                </button>
                            </div>
                        </motion.div>

                        {/* Folder Sync Tutorial (Module 2) */}
                        <AnimatePresence>
                            {showFolderModal && (
                                <div className="fixed inset-0 z-[100] flex items-center justify-center p-6">
                                    <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="absolute inset-0 bg-slate-950/90 backdrop-blur-sm" />
                                    <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} exit={{ scale: 0.9, opacity: 0 }} className="relative bg-slate-900 border border-white/10 p-10 rounded-[3rem] w-full max-w-md shadow-2xl space-y-8">
                                        <div className="w-16 h-16 bg-emerald-500/10 rounded-2xl flex items-center justify-center">
                                            <Info className="w-8 h-8 text-emerald-500" />
                                        </div>
                                        <div className="space-y-4">
                                            <h2 className="text-2xl font-black">Sincronização de Pasta</h2>
                                            <p className="text-slate-400 text-sm leading-relaxed">
                                                Para garantir que seus dados nunca se percam, você escolherá uma pasta mestre no seu dispositivo. 
                                                O VerdeGrana criará e atualizará automaticamente um arquivo <span className="font-mono text-emerald-400">.json</span> para cada perfil criado dentro dessa pasta.
                                            </p>
                                        </div>
                                        <div className="flex flex-col gap-3">
                                            <button onClick={requestFolderAccess} className="w-full py-5 bg-emerald-500 text-white font-black rounded-3xl hover:bg-emerald-600 transition-all flex items-center justify-center gap-3">
                                                Entendi, selecionar pasta <ChevronRight size={20} />
                                            </button>
                                            <button onClick={() => setShowFolderModal(false)} className="w-full py-4 text-slate-500 font-bold hover:text-white transition-all">Cancelar</button>
                                        </div>
                                    </motion.div>
                                </div>
                            )}
                        </AnimatePresence>
                    </div>
                );
            }

            if (bootStatus === 'profile_select') {
                return (
                    <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-8">
                        <h1 className="text-4xl font-black tracking-tighter mb-16">Quem está usando?</h1>
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-8 w-full max-w-4xl">
                            {profiles.map(p => (
                                <button 
                                    key={p} 
                                    onClick={() => loadProfile(p)}
                                    className="aspect-square bg-white/5 border border-white/10 rounded-[2.5rem] flex flex-col items-center justify-center gap-5 hover:border-emerald-500 transition-all group"
                                >
                                    <div className="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center group-hover:bg-emerald-500/10 transition-all shadow-xl">
                                        <User className="w-10 h-10 text-slate-500 group-hover:text-emerald-400" />
                                    </div>
                                    <span className="font-bold uppercase tracking-widest text-[10px] text-slate-400 group-hover:text-white">{p}</span>
                                </button>
                            ))}
                            <button 
                                onClick={() => {
                                    const n = prompt("Nome do novo perfil:");
                                    if(n) setProfiles(v => [...v, n]);
                                }}
                                className="aspect-square border border-dashed border-white/10 rounded-[2.5rem] flex flex-col items-center justify-center gap-4 hover:border-emerald-500 transition-all group opacity-50 hover:opacity-100"
                            >
                                <Plus className="w-10 h-10 text-slate-500 group-hover:text-emerald-500" />
                                <span className="font-bold uppercase tracking-widest text-[10px] text-slate-500">Adicionar</span>
                            </button>
                        </div>
                        <button onClick={() => setBootStatus('auth')} className="mt-16 text-slate-500 font-bold uppercase tracking-widest text-[10px] hover:text-white transition-all">Voltar p/ Login</button>
                    </div>
                );
            }

            // Dashboard
            return (
                <div className="min-h-screen bg-slate-950 text-white font-sans flex flex-col pb-24 md:pb-0">
                    <header className="p-8 flex justify-between items-center max-w-7xl mx-auto w-full">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20"><Leaf className="w-6 h-6" /></div>
                            <span className="text-2xl font-black tracking-tighter">VerdeGrana</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="hidden md:flex flex-col items-end mr-4">
                                <label className="text-[8px] font-black uppercase text-slate-500 tracking-widest">Perfil</label>
                                <div className="font-bold text-emerald-400">{activeProfile}</div>
                            </div>
                            <button onClick={() => setSyncStatus('working')} className="p-3 bg-white/5 rounded-xl text-slate-500 hover:text-white transition-all"><RefreshCw className={cn("w-5 h-5", syncStatus === 'working' && "animate-spin")} /></button>
                            <button onClick={() => setBootStatus('profile_select')} className="p-3 bg-white/5 rounded-xl text-slate-500 hover:text-white transition-all"><Users className="w-5 h-5" /></button>
                        </div>
                    </header>

                    <main className="p-8 max-w-7xl mx-auto w-full space-y-8 flex-1">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-8">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-emerald-500 p-10 rounded-[3rem] h-72 flex flex-col justify-between shadow-2xl shadow-emerald-500/20 relative overflow-hidden group">
                                        <div className="z-10">
                                            <label className="text-[10px] font-black uppercase tracking-[0.3em] opacity-60">Meu Balanço</label>
                                            <h2 className="text-6xl font-black tracking-tighter mt-2">{formatCurrency(stats.total)}</h2>
                                        </div>
                                        <div className="z-10 flex items-center gap-2">
                                            <div className="w-2 h-2 bg-white rounded-full animate-pulse" />
                                            <span className="text-[10px] font-black uppercase tracking-widest opacity-80">{isCloudMode ? "Nuvem Ativa" : "Sinc Local"}</span>
                                        </div>
                                        <div className="absolute top-0 right-0 p-10 opacity-20 group-hover:scale-110 transition-transform"><Wallet size={120} /></div>
                                    </div>

                                    <div className="bg-slate-900 border border-white/5 p-10 rounded-[3rem] h-72 flex flex-col justify-between">
                                        <label className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500">Movimentações</label>
                                        <div className="grid grid-cols-2 gap-8">
                                            <div>
                                                <div className="flex items-center gap-2 text-emerald-400 mb-2">
                                                    <TrendingUp size={16} />
                                                    <span className="text-[10px] font-black uppercase tracking-widest">Ganhos</span>
                                                </div>
                                                <div className="text-2xl font-black">{formatCurrency(stats.income)}</div>
                                            </div>
                                            <div>
                                                <div className="flex items-center gap-2 text-rose-400 mb-2">
                                                    <TrendingDown size={16} />
                                                    <span className="text-[10px] font-black uppercase tracking-widest">Gastos</span>
                                                </div>
                                                <div className="text-2xl font-black">{formatCurrency(stats.expense)}</div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-900 border border-white/5 p-10 rounded-[3rem] h-72 flex flex-col justify-between group">
                                        <label className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500">Integridade</label>
                                        <div className="flex items-center gap-4">
                                            <div className="w-16 h-16 bg-emerald-500/10 rounded-3xl flex items-center justify-center text-emerald-500 group-hover:bg-emerald-500 group-hover:text-white transition-all">
                                                <ShieldCheck size={32} />
                                            </div>
                                            <div>
                                                <div className="font-bold text-lg">Sincronizado</div>
                                                <div className="text-xs text-slate-500">Dados seguros em tempo real.</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div className="bg-slate-900 border border-white/5 p-8 rounded-[3rem] min-h-[400px]">
                                        <div className="flex items-center justify-between mb-8">
                                             <h3 className="text-xl font-black uppercase tracking-tighter">Histórico Recente</h3>
                                             <button className="text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-emerald-400 transition-all">Ver Tudo</button>
                                        </div>
                                        <div className="space-y-4">
                                            {transactions.slice(0, 5).map(t => (
                                                <div key={t.id} className="flex items-center justify-between p-6 bg-white/5 rounded-3xl group hover:border-white/10 transition-all border border-transparent">
                                                    <div className="flex items-center gap-4">
                                                        <div className={cn("w-12 h-12 rounded-2xl flex items-center justify-center", t.type === 'entrada' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-500')}>
                                                            {t.type === 'entrada' ? <TrendingUp size={20} /> : <TrendingDown size={20} />}
                                                        </div>
                                                        <div>
                                                            <div className="font-bold text-slate-200">{t.desc}</div>
                                                            <div className="text-[10px] font-black uppercase text-slate-500 tracking-widest">{t.category}</div>
                                                        </div>
                                                    </div>
                                                    <div className={cn("text-lg font-black", t.type === 'entrada' ? 'text-emerald-400' : 'text-rose-400')}>
                                                        {t.type === 'entrada' ? '+' : '-'} {formatCurrency(t.value)}
                                                    </div>
                                                </div>
                                            ))}
                                            {transactions.length === 0 && (
                                                <div className="h-64 flex flex-col items-center justify-center text-slate-600 gap-4">
                                                    <div className="p-6 bg-white/5 rounded-full"><ReceiptText size={48} /></div>
                                                    <div className="text-xs font-black uppercase tracking-[0.2em]">Nenhuma transação registrada.</div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    {/* Intelligence Tab Placeholder Grid */}
                                    <div className="bg-slate-900 border border-white/5 p-8 rounded-[3rem] min-h-[400px] flex flex-col justify-between">
                                        <div className="space-y-4">
                                            <div className="flex items-center gap-3 text-emerald-400">
                                                <Bot size={24} />
                                                <h3 className="text-xl font-black uppercase tracking-tighter">Análise IA</h3>
                                            </div>
                                            <p className="text-slate-500 text-sm">O VerdeGrana AI está analisando seus padrões de gasto para otimizar suas economias.</p>
                                        </div>
                                        <div className="p-8 bg-emerald-500/5 rounded-3xl border border-emerald-500/10 text-center">
                                             <div className="text-3xl font-black text-emerald-400 mb-2">85%</div>
                                             <div className="text-[10px] font-black uppercase tracking-widest text-slate-500">Eficiência de orçamento</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'transactions' && (
                            <div className="space-y-8 pb-32">
                                <div className="flex justify-between items-end">
                                    <h2 className="text-4xl font-black tracking-tighter">Transações</h2>
                                    <div className="text-slate-500 font-bold uppercase tracking-widest text-[10px]">{transactions.length} registros</div>
                                </div>
                                <div className="grid gap-4">
                                    {transactions.sort((a,b) => new Date(b.date) - new Date(a.date)).map(t => (
                                        <div key={t.id} className="bg-slate-900 border border-white/5 p-6 rounded-3xl flex items-center justify-between group hover:border-emerald-500/30 transition-all">
                                            <div className="flex items-center gap-4">
                                                <div className={cn("w-12 h-12 rounded-2xl flex items-center justify-center", t.type === 'entrada' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-500')}>
                                                    {t.type === 'entrada' ? <TrendingUp size={20} /> : <TrendingDown size={20} />}
                                                </div>
                                                <div>
                                                    <div className="font-bold text-lg">{t.desc}</div>
                                                    <div className="text-xs text-slate-500 flex items-center gap-2">
                                                        <span>{t.category}</span>
                                                        <span className="w-1 h-1 bg-slate-700 rounded-full" />
                                                        <span>{new Date(t.date).toLocaleDateString('pt-BR')}</span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-6">
                                                <div className={cn("text-xl font-black", t.type === 'entrada' ? 'text-emerald-400' : 'text-rose-400')}>
                                                    {t.type === 'entrada' ? '+' : '-'} {formatCurrency(t.value)}
                                                </div>
                                                <button onClick={() => deleteTransaction(t.id)} className="p-2 opacity-0 group-hover:opacity-100 text-slate-500 hover:text-rose-500 transition-all">
                                                    <Trash2 size={18} />
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        
                        {activeTab === 'settings' && (
                             <div className="space-y-8 pb-32">
                                <h2 className="text-4xl font-black tracking-tighter">Configurações</h2>
                                <section className="p-10 bg-slate-900 border border-white/5 rounded-[3rem] space-y-8">
                                    <div className="flex items-center justify-between">
                                        <div>
                                            <h3 className="text-xl font-bold mb-1">Backup na Nuvem</h3>
                                            <p className="text-slate-500 text-sm">Sincronize seus dados com o VerdeGrana Cloud.</p>
                                        </div>
                                        <div className="w-16 h-8 bg-white/10 rounded-full p-1 flex items-center justify-start cursor-pointer hover:bg-white/20 transition-all">
                                            <div className="w-6 h-6 bg-slate-500 rounded-full" />
                                        </div>
                                    </div>
                                    <div className="h-px bg-white/5" />
                                    <div className="flex items-center justify-between">
                                        <div>
                                            <h3 className="text-xl font-bold mb-1">Deep Clean (Excluir Tudo)</h3>
                                            <p className="text-rose-500/60 text-sm">Apaga definitivamente todos os perfis e dados deste dispositivo.</p>
                                        </div>
                                        <button className="px-6 py-3 bg-rose-500/10 text-rose-500 font-bold rounded-xl hover:bg-rose-500 hover:text-white transition-all">Resetar App</button>
                                    </div>
                                </section>
                             </div>
                        )}
                    </main>

                    {/* Navbar */}
                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 glass border border-white/10 px-8 py-4 rounded-[3rem] flex items-center gap-12 shadow-2xl z-50">
                        <button onClick={() => setActiveTab('dashboard')} className={cn("p-2 transition-all", activeTab === 'dashboard' ? 'text-emerald-500' : 'text-slate-500')}><LayoutDashboard /></button>
                        <button onClick={() => setActiveTab('transactions')} className={cn("p-2 transition-all", activeTab === 'transactions' ? 'text-emerald-500' : 'text-slate-500')}><ReceiptText /></button>
                        <button onClick={() => setShowAddModal(true)} className="w-14 h-14 bg-emerald-500 rounded-2xl flex items-center justify-center shadow-lg hover:scale-110 active:scale-95 transition-all text-white"><Plus /></button>
                        <button onClick={() => setActiveTab('ai')} className={cn("p-2 transition-all", activeTab === 'ai' ? 'text-emerald-500' : 'text-slate-500')}><Bot /></button>
                        <button onClick={() => setActiveTab('settings')} className={cn("p-2 transition-all", activeTab === 'settings' ? 'text-emerald-500' : 'text-slate-500')}><Settings /></button>
                    </nav>

                    {/* Add Transaction Modal */}
                    <AnimatePresence>
                        {showAddModal && (
                            <div className="fixed inset-0 z-[100] flex items-end md:items-center justify-center p-0 md:p-6">
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} onClick={() => setShowAddModal(false)} className="absolute inset-0 bg-slate-950/80 backdrop-blur-sm" />
                                <motion.div 
                                    initial={{ y: "100%" }} animate={{ y: 0 }} exit={{ y: "100%" }}
                                    className="relative bg-slate-900 border-t md:border border-white/10 p-8 rounded-t-[3rem] md:rounded-[3rem] w-full max-w-md shadow-2xl space-y-6"
                                >
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-2xl font-black">Nova Transação</h2>
                                        <button onClick={() => setShowAddModal(false)} className="p-2 bg-white/5 rounded-full"><X size={20} /></button>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 bg-white/5 p-1 rounded-2xl">
                                        <button onClick={() => setNewTx({...newTx, type: 'entrada'})} className={cn("py-3 rounded-xl font-bold transition-all", newTx.type === 'entrada' ? 'bg-emerald-500 text-white' : 'text-slate-500')}>Entrada</button>
                                        <button onClick={() => setNewTx({...newTx, type: 'saída'})} className={cn("py-3 rounded-xl font-bold transition-all", newTx.type === 'saída' ? 'bg-emerald-500 text-white' : 'text-slate-500')}>Saída</button>
                                    </div>

                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-2">Descrição</label>
                                            <input value={newTx.desc} onChange={e => setNewTx({...newTx, desc: e.target.value})} placeholder="Pizzaria, Salário..." className="w-full bg-white/5 border border-white/10 p-5 rounded-2xl focus:border-emerald-500 outline-none transition-all placeholder:text-slate-700 font-bold" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-2">Valor (R$)</label>
                                            <input type="number" value={newTx.value} onChange={e => setNewTx({...newTx, value: e.target.value})} placeholder="0,00" className="w-full bg-white/5 border border-white/10 p-5 rounded-2xl focus:border-emerald-500 outline-none transition-all text-xl font-black text-emerald-400" />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-2">Categoria</label>
                                            <select value={newTx.category} onChange={e => setNewTx({...newTx, category: e.target.value})} className="w-full bg-white/5 border border-white/10 p-5 rounded-2xl focus:border-emerald-500 outline-none appearance-none font-bold">
                                                {categories.map(c => <option key={c.id} value={c.name} className="bg-slate-900 text-white">{c.name}</option>)}
                                            </select>
                                        </div>
                                    </div>

                                    <button onClick={handleAddTransaction} className="w-full py-6 bg-emerald-500 text-white font-black rounded-3xl hover:bg-emerald-600 transition-all text-lg shadow-xl shadow-emerald-500/20">Adicionar Agora</button>
                                </motion.div>
                            </div>
                        )}
                    </AnimatePresence>

                    <Toaster theme="dark" position="top-right" richColors />
                </div>
            );
        }

        // --- Render Root ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

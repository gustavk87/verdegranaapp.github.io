<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=https://verdegrana.vercel.app/">
    <title>VerdeGrana - Redirecionando...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spinner {
            to { transform: rotate(360deg); }
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #10b981;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spinner 0.8s linear infinite;
        }
    </style>
</head>
<body class="bg-slate-950 flex flex-col items-center justify-center min-h-screen text-white font-sans text-center p-6">
    <div class="spinner mb-6"></div>
    <h1 class="text-2xl font-bold mb-2">Redirecionando...</h1>
    <p class="text-slate-400 max-w-sm">
        Estamos movendo o VerdeGrana para uma infraestrutura mais rápida e segura no Vercel.
    </p>
    <p class="mt-8 text-sm text-slate-500">
        Se não for redirecionado automaticamente, <a href="https://verdegrana.vercel.app/" class="text-emerald-400 hover:underline">clique aqui</a>.
    </p>

    <script>
        window.location.href = "https://verdegrana.vercel.app/";
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=https://verdegrana.vercel.app/">
    <title>Redirecionando para VerdeGrana</title>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #10b981;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        a { color: #10b981; text-decoration: none; font-weight: bold; }
    </style>

    <script type="text/javascript">
        // Redirecionamento via JavaScript como garantia extra
        window.location.href = "https://verdegrana.vercel.app/";
    </script>
</head>
<body>
    <div>
        <div class="loader"></div>
        <p>O VerdeGrana mudou de endereço para melhor atendê-lo!</p>
        <p>Se não for redirecionado em instantes, <br>
           <a href="https://verdegrana.vercel.app/">clique aqui para acessar o novo site</a>.</p>
    </div>
</body>
</html>
